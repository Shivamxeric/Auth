<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0f172a;
    overflow: hidden;
}

/* Floating Emojis Background */
.emoji {
    position: absolute;
    font-size: 24px;
    animation: float 8s linear infinite;
    opacity: 0.7;
}

@keyframes float {
    0% {transform: translateY(100vh) rotate(0deg);}
    100% {transform: translateY(-10vh) rotate(360deg);}
}

/* Form Container */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Glass Card */
.form-box {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding: 30px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
    color: white;
    box-shadow: 0 0 25px rgba(255,0,255,0.4);
    animation: pop 0.8s ease;
}

@keyframes pop {
    0% {transform: scale(0.7); opacity: 0;}
    100% {transform: scale(1); opacity: 1;}
}

/* Inputs */
.form-box input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    outline: none;
    transition: 0.3s;
}

.form-box input:focus {
    transform: scale(1.05);
    box-shadow: 0 0 10px cyan;
}

/* Button */
.form-box button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg, #ff00cc, #3333ff);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.form-box button:hover {
    transform: scale(1.1);
    background: linear-gradient(45deg, #00ffcc, #ff0066);
}

/* Title Animation */
.title {
    font-size: 24px;
    margin-bottom: 15px;
    animation: bounce 1s infinite alternate;
}

@keyframes bounce {
    from {transform: translateY(0);}
    to {transform: translateY(-10px);}
}

/* Link */
.link {
    margin-top: 10px;
}

.link a {
    color: #00ffff;
    text-decoration: none;
}
</style>
</head>

<body>

<!-- Floating Emojis -->
<div class="emoji" style="left:10%; animation-delay:0s;">🚀</div>
<div class="emoji" style="left:20%; animation-delay:2s;">✨</div>
<div class="emoji" style="left:40%; animation-delay:4s;">🔥</div>
<div class="emoji" style="left:60%; animation-delay:1s;">🎉</div>
<div class="emoji" style="left:80%; animation-delay:3s;">💻</div>

<!-- Form -->
<div class="container">
    <div class="form-box">
        <div class="title">Create Account 😎✨</div>
        
        <form action="/register/" method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="👤 Username" required>
            <input type="email" name="email" placeholder="📧 Email" required>
            <input type="password" name="password" placeholder="🔒 Password" required>
            <button type="submit">Join Now 🚀</button>
        </form>
        {% if message %}
    <div class="msg">{{ message }}</div>
{% endif %}

        <div class="link">
            Already a user? <a href="/login/">Login 🔐</a>
        </div>
    </div>
</div>

</body>
</html>
