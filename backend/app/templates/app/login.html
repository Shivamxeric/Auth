<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0f172a;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.form-box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(15px);
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    color: white;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,255,255,0.3);
    animation: slideUp 0.8s ease;
}

@keyframes slideUp {
    from {transform: translateY(50px); opacity: 0;}
    to {transform: translateY(0); opacity: 1;}
}

.form-box h2 {
    margin-bottom: 20px;
}

.form-box input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    outline: none;
}

.form-box button {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: cyan;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.form-box button:hover {
    background: white;
    transform: scale(1.05);
}

.link {
    margin-top: 10px;
}

.link a {
    color: cyan;
    text-decoration: none;
}

.msg {
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
    font-weight: bold;
    animation: fadeIn 0.5s ease;
}

.msg.success {
    background: rgba(0,255,0,0.2);
    color: #00ffcc;
}

.msg.error {
    background: rgba(255,0,0,0.2);
    color: #ff4d4d;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>
</head>

<body>
<div class="form-box">
    <h2>Welcome Back 🔐</h2>

    <form action="/login/" method="POST">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="link">
        New here? <a href="/register/">Register</a>
    </div>

    {% if message %}
        <div class="msg {{ type }}">{{ message }}</div>
    {% endif %}
</div>
</body>
</html>
